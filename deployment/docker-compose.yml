services:

  # ==========================
  # PostgreSQL
  # ==========================
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: maestro-hotelongo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin1234
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hotels-network

  # ==========================
  # Kafka
  # ==========================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    hostname: kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    networks:
      - hotels-network

  # ==========================
  # Redis
  # ==========================
  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - hotels-network

  # ==========================
  # Discovery Server
  # ==========================
  discovery-server:
    build:
      context: ../discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - hotels-network

  # ==========================
  # Auth Service
  # ==========================
  auth-service:
    build:
      context: ../auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - discovery-server
    environment:
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
    networks:
      - hotels-network

  # ==========================
  # Booking Service (FIXED POSITION)
  # ==========================
  booking-service:
    build:
      context: ../booking-service
    container_name: booking-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - kafka
      - redis
      - discovery-server
    environment:
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    networks:
      - hotels-network

  # ==========================
  # Payment Service
  # ==========================
  payment-service:
    build:
      context: ../payment-service
    container_name: payment-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - kafka
      - discovery-server
    environment:
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - hotels-network

  # ==========================
  # Notification Service
  # ==========================
  notification-service:
    build:
      context: ../notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    depends_on:
      - kafka
      - discovery-server
    environment:
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
    networks:
      - hotels-network

  # ==========================
  # Email Service
  # ==========================
  email-service:
    build:
      context: ../email-service
    container_name: email-service
    ports:
      - "8085:8085"
    depends_on:
      - kafka
      - discovery-server
    environment:
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
    networks:
      - hotels-network

  # ==========================
  # API Gateway
  # ==========================
  api-gateway:
    build:
      context: ../api-gateway
    container_name: api-gateway
    ports:
      - "9090:9090"
    depends_on:
      - discovery-server
      - auth-service
      - booking-service
    environment:
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
    networks:
      - hotels-network

volumes:
  postgres-data:

networks:
  hotels-network:
    driver: bridge