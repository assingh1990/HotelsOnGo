spring.application.name=api-gateway
server.port=9090

# ================= EUREKA =================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://discovery-server:8761/eureka}

# ================= GATEWAY =================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ================= JWT (IMPORTANT FIX) =================
jwt.secret=mysecretkeymysecretkeymysecretkey

# \u274C WRONG (Spring does NOT use this property)
# spring.security.oauth2.resourceserver.jwt.secret-key

# \u2714 CORRECT WAY (if using symmetric key)
spring.security.oauth2.resourceserver.jwt.secret=${jwt.secret}

# ================= CORS =================
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# ================= ROUTES =================

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# BOOKING SERVICE
spring.cloud.gateway.routes[1].id=booking-service
spring.cloud.gateway.routes[1].uri=lb://booking-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/bookings/**

# MASTER DATA (same service reuse)
spring.cloud.gateway.routes[2].id=master-data-service
spring.cloud.gateway.routes[2].uri=lb://booking-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/master-data/**

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true

# ================= LOGGING =================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web.cors=DEBUG