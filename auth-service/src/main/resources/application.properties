spring.application.name=auth-service
server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/maestro-hotelongo}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://discovery-server:8761/eureka}