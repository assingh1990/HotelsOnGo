server.port=8085
spring.application.name=notification-service

logging.file.name=logs/notification-service.log 

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://discovery-server:8761/eureka}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

notification.kafka.topics.booking-confirmed=booking-confirmed

# Enable circuit breaker for Feign
spring.cloud.openfeign.circuitbreaker.enabled=true
logging.level.feign=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG

resilience4j.circuitbreaker.instances.email-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.email-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.email-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.email-service.waitDurationInOpenState=10s
