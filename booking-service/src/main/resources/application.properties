spring.application.name=booking-service
server.port=8082

logging.file.name=logs/booking-service.log

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://discovery-server:8761/eureka}

# ===============================
# Eureka FIX (REQUIRED)
# ===============================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.cloud.discovery.enabled=true

management.endpoints.web.exposure.include=*

# ===============================
# PostgreSQL
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/maestro-hotelongo}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin1234}

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Kafka
# ===============================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=booking-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

booking.kafka.topics.payment-success=payment-success
booking.kafka.topics.payment-failed=payment-failed

spring.redis.host=redis
spring.redis.port=6379